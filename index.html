<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중국어 단어 퀴즈 왕</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #22c55e;
            --error: #ef4444;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Start Screen */
        .start-screen p {
            margin-bottom: 2rem;
            color: var(--text-muted);
        }

        /* Quiz Screen */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .question-box {
            margin-bottom: 2.5rem;
        }

        .chinese-word {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #f5f3ff;
        }

        .option-btn.correct {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--error);
            border-color: var(--error);
            color: white;
        }

        /* Result Screen */
        .result-screen h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .final-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        /* Ranking Screen */
        .ranking-list {
            margin: 2rem 0;
            text-align: left;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .ranking-item:last-child {
            border-bottom: none;
        }

        .rank-num {
            font-weight: 700;
            color: var(--primary);
            margin-right: 12px;
        }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            margin-top: 1rem;
        }

        .btn-secondary:hover {
            background: #f5f3ff;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            #app {
                padding: 30px 20px;
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1>중국어 단어 퀴즈</h1>
        <p>10개의 중국어 단어 문제를 풀고<br>당신의 실력을 증명해보세요!</p>
        <button class="btn" onclick="game.start()">게임 시작</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-header">
            <span id="progress">진행도: 1/10</span>
            <span id="score-display">현재 점수: 0</span>
        </div>
        <div class="question-box">
            <span class="chinese-word" id="word">你好</span>
        </div>
        <div class="options-grid" id="options">
            <!-- Options will be injected here -->
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <h2>퀴즈 종료!</h2>
        <div class="final-score" id="final-score">0점</div>
        <div class="input-group">
            <label for="nickname">닉네임 입력</label>
            <input type="text" id="nickname" placeholder="닉네임을 입력하세요" maxlength="10">
        </div>
        <button class="btn" id="save-btn" onclick="game.saveScore()">점수 저장 및 랭킹 보기</button>
        <button class="btn btn-secondary" onclick="game.reset()">다시 하기</button>
    </div>

    <!-- Ranking Screen -->
    <div id="ranking-screen" class="screen">
        <h2>실시간 랭킹 (Top 5)</h2>
        <div class="ranking-list" id="ranking-list">
            <!-- Ranking items will be injected here -->
            <p style="text-align: center; color: var(--text-muted);">로딩 중...</p>
        </div>
        <button class="btn" onclick="game.reset()">메인으로</button>
    </div>
</div>

<!-- Firebase SDK v10 CDN -->
<script type="module">
    import { initializeApp } from  "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } from  "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

    // Firebase Configuration
    const firebaseConfig = {
     apiKey: "AIzaSyBoP4SkYEKt2QAPtSlhJ5Td3DcZAs_6rl8",
    authDomain: "haoz-54d2d.firebaseapp.com",
    projectId: "haoz-54d2d",
    storageBucket: "haoz-54d2d.firebasestorage.app",
    messagingSenderId: "406684897424",
    appId: "1:406684897424:web:e964a7f61c89d7d6880815",
    measurementId: "G-NF4HY3PSXZ"
  };
   // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
        // YOUR_CONFIG_HERE
    };

    // Initialize Firebase (Only if config is provided)
    let db;
    try {
        if (firebaseConfig.apiKey) {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        }
    } catch (e) {
        console.error("Firebase initialization failed", e);
    }

    // Quiz Data
    const quizData = [
        { word: "你好", options: ["안녕하세요", "감사합니다", "미안합니다", "선생님"], answer: 0 },
        { word: "谢谢", options: ["안녕하세요", "감사합니다", "친구", "사과"], answer: 1 },
        { word: "苹果", options: ["포도", "바나나", "사과", "딸기"], answer: 2 },
        { word: "老师", options: ["학생", "의사", "경찰", "선생님"], answer: 3 },
        { word: "朋友", options: ["친구", "가족", "동료", "이웃"], answer: 0 },
        { word: "学习", options: ["운동", "공부", "잠", "식사"], answer: 1 },
        { word: "漂亮", options: ["못생기다", "예쁘다", "크다", "작다"], answer: 1 },
        { word: "咖啡", options: ["차", "물", "커피", "우유"], answer: 2 },
        { word: "电影", options: ["음악", "책", "그림", "영화"], answer: 3 },
        { word: "快乐", options: ["슬프다", "화나다", "행복하다", "졸리다"], answer: 2 }
    ];

    class QuizGame {
        constructor() {
            this.currentIdx = 0;
            this.score = 0;
            this.isAnswered = false;
        }

        start() {
            this.currentIdx = 0;
            this.score = 0;
            this.showScreen('quiz-screen');
            this.loadQuestion();
        }

        loadQuestion() {
            this.isAnswered = false;
            const q = quizData[this.currentIdx];
            document.getElementById('progress').innerText = `진행도: ${this.currentIdx + 1}/10`;
            document.getElementById('score-display').innerText = `현재 점수: ${this.score}`;
            document.getElementById('word').innerText = q.word;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => this.checkAnswer(idx, btn);
                optionsContainer.appendChild(btn);
            });
        }

        checkAnswer(idx, btn) {
            if (this.isAnswered) return;
            this.isAnswered = true;

            const q = quizData[this.currentIdx];
            const allBtns = document.querySelectorAll('.option-btn');

            if (idx === q.answer) {
                btn.classList.add('correct');
                this.score += 10;
                document.getElementById('score-display').innerText = `현재 점수: ${this.score}`;
            } else {
                btn.classList.add('wrong');
                allBtns[q.answer].classList.add('correct');
            }

            // Disable all buttons
            allBtns.forEach(b => b.disabled = true);

            // Next question after delay
            setTimeout(() => {
                this.currentIdx++;
                if (this.currentIdx < quizData.length) {
                    this.loadQuestion();
                } else {
                    this.showResult();
                }
            }, 1000);
        }

        showResult() {
            this.showScreen('result-screen');
            document.getElementById('final-score').innerText = `${this.score}점`;
        }

        async saveScore() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                alert("닉네임을 입력해주세요!");
                return;
            }

            if (!db) {
                alert("Firebase 설정이 필요합니다. 코드를 확인해주세요.");
                this.loadRanking(); // Show empty ranking screen anyway
                return;
            }

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "저장 중...";

            try {
                await addDoc(collection(db, 'scores'), {
                    nickname: nickname,
                    score: this.score,
                    timestamp: serverTimestamp()
                });
                this.loadRanking();
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("점수 저장에 실패했습니다.");
                saveBtn.disabled = false;
                saveBtn.innerText = "점수 저장 및 랭킹 보기";
            }
        }

        async loadRanking() {
            this.showScreen('ranking-screen');
            const rankingList = document.getElementById('ranking-list');
            rankingList.innerHTML = '<p style="text-align: center; color: var(--text-muted);">로딩 중...</p>';

            if (!db) {
                rankingList.innerHTML = '<p style="text-align: center; color: var(--error);">Firebase 설정이 되어있지 않습니다.</p>';
                return;
            }

            try {
                const q = query(collection(db, 'scores'), orderBy('score', 'desc'), limit(5));
                const querySnapshot = await getDocs(q);
                
                rankingList.innerHTML = '';
                let rank = 1;
                
                if (querySnapshot.empty) {
                    rankingList.innerHTML = '<p style="text-align: center; color: var(--text-muted);">아직 등록된 점수가 없습니다.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'ranking-item';
                    item.innerHTML = `
                        <span><span class="rank-num">${rank++}</span>${data.nickname}</span>
                        <span style="font-weight: 700;">${data.score}점</span>
                    `;
                    rankingList.appendChild(item);
                });
            } catch (e) {
                console.error("Error getting rankings: ", e);
                rankingList.innerHTML = '<p style="text-align: center; color: var(--error);">랭킹을 불러오는데 실패했습니다.</p>';
            }
        }

        showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        reset() {
            document.getElementById('nickname').value = '';
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = false;
            saveBtn.innerText = "점수 저장 및 랭킹 보기";
            this.showScreen('start-screen');
        }
    }

    // Global game instance
    window.game = new QuizGame();
</script>

</body>
</html>
